name = "driftops-dev-worker"
main = "worker/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Free tier — no paid plan needed
# 100,000 requests/day, 10ms CPU/request

[[kv_namespaces]]
binding = "DRIFTOPS_KV"
id = "eb6bc49a8f7b4fe68e82dc23ce210a8e"          # Run: wrangler kv:namespace create DRIFTOPS_KV
preview_id = "71c4101c20044c8081b40cda3c992294"

[vars]
ENVIRONMENT = "production"

# Secrets (set via: wrangler secret put SECRET_NAME)
# SUPABASE_URL
# SUPABASE_SERVICE_KEY

[env.dev]
name = "driftops-dev-worker-dev"
vars = { ENVIRONMENT = "development" }
